*{font-family:'Poppins',sans-serif;box-sizing:border-box;}
body{background:#0b1120;color:#f1f5f9;margin:0;}

.btn-secondary:hover{background:#334155;}
.btn-ghost{background:transparent;color:#94a3b8;border:none;padding:6px 12px;border-radius:10px;font-size:12px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:background .2s;}

.page{display:none;animation:fadeUp .35s ease both;}
.page.active{display:block;}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px;}

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7) }
function hoy() { return new Date().toISOString().split('T')[0] }
function fmtCOP(n) { return new Intl.NumberFormat('es-CO',{style:'currency',currency:'COP',maximumFractionDigits:0}).format(n||0) }
function fmtFecha(f) { if(!f) return '—'; try{return new Date(f+'T00:00:00').toLocaleDateString('es-CO',{day:'2-digit',month:'short',year:'numeric'})}catch{return f} }
function tiempoRelativo(ts) {
  if(!ts) return ''
  const diff = Date.now() - new Date(ts).getTime()
  const min = Math.floor(diff/60000)
  if(min<1) return 'Hace un momento'
  if(min<60) return `Hace ${min} min`
  const h = Math.floor(min/60)
  if(h<24) return `Hace ${h}h`
  return `Hace ${Math.floor(h/24)}d`
}

// ── Calcular costo de producción ──
function calcularCosto(producto) {
  const insumos = DB.get('insumos')
  if(!producto.receta || !producto.receta.length) return 0
  return producto.receta.reduce((total, r) => {
    const ins = insumos.find(i => i.id === r.insumoId)
    return total + (ins ? ins.costo * r.cant : 0)
  }, 0)
}
function calcularMargen(producto) {
  const costo = calcularCosto(producto)
  if(!producto.precio) return 0
  return ((producto.precio - costo) / producto.precio * 100)
}

function goTo(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'))
  document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'))
  document.getElementById('page-'+page).classList.add('active')
  const navEl = document.getElementById('nav-'+page)
  if(navEl) navEl.classList.add('active')
  const info = PAGES[page] || {}
  document.getElementById('pageTitle').textContent = info.titulo || page
  document.getElementById('pageSub').textContent = info.sub || ''
  closeSidebar()
  // Render de la página
  if(page === 'dashboard') renderDashboard()
  if(page === 'pedidos') renderPedidos()
  if(page === 'productos') renderProductos()
  if(page === 'inventario') renderInventario()
  if(page === 'financiero') renderFinanciero()
  if(page === 'clientes') renderClientes()
}

function cambiarEstadoPedido(id, nuevoEstado) {
  const pedidos = DB.get('pedidos')
  const idx = pedidos.findIndex(p=>p.id===id)
  if(idx<0) return
  const p = pedidos[idx]
  const trans = TRANSICIONES[p.estado]||[]
  if(!trans.includes(nuevoEstado)) { showToast('⚠️ Transición no permitida','#f59e0b'); return }

  // Descontar stock si pasa a en_preparacion
  if(nuevoEstado==='en_preparacion') {
    const insumos = DB.get('insumos')
    const productos = DB.get('productos')
    const productosActualizados = [...productos]
    const insumosActualizados = [...insumos]
    for(const item of (p.items||[])) {
      const prod = productosActualizados.find(pr=>pr.id===item.productoId)
      if(prod) {
        prod.stock = Math.max(0, prod.stock - item.cantidad)
        if(prod.receta) {
          for(const r of prod.receta) {
            const ins = insumosActualizados.find(i=>i.id===r.insumoId)
            if(ins) ins.stock = Math.max(0, ins.stock - r.cant*item.cantidad)
          }
        }
      }
    }
    DB.set('productos', productosActualizados)
    DB.set('insumos', insumosActualizados)
  }

  // Registrar ingreso si se entrega
  if(nuevoEstado==='entregado' && !p.pagoConfirmado) {
    const movs = DB.get('movimientos')
    movs.push({id:uid(),tipo:'ingreso',categoria:'venta',monto:p.total,descripcion:`Venta ${p.codigo}`,canal:p.metodoPago||'efectivo',fecha:hoy(),pedidoId:p.id})
    DB.set('movimientos',movs)
    pedidos[idx].pagoConfirmado = true
  }

  pedidos[idx].estado = nuevoEstado
  DB.set('pedidos', pedidos)
  closeModal()
  renderPedidos()
  showToast(`✅ Estado actualizado: ${ESTADO_BADGE[nuevoEstado]?.label}`)
}

function confirmarPagoPedido(id) {
  const pedidos = DB.get('pedidos')
  const idx = pedidos.findIndex(p=>p.id===id)
  if(idx<0||pedidos[idx].pagoConfirmado) return
  pedidos[idx].pagoConfirmado = true
  const movs = DB.get('movimientos')
  movs.push({id:uid(),tipo:'ingreso',categoria:'venta',monto:pedidos[idx].total,descripcion:`Pago ${pedidos[idx].codigo}`,canal:pedidos[idx].metodoPago||'efectivo',fecha:hoy(),pedidoId:id})
  DB.set('movimientos',movs)
  DB.set('pedidos',pedidos)
  closeModal()
  renderPedidos()
  showToast('✅ Pago confirmado y registrado')
}

function abrirModalNuevoPedido() {
  const clientes = DB.get('clientes')
  const productos = DB.get('productos').filter(p=>p.activo)
  let itemsForm = []

  const renderItems = () => {
    return itemsForm.map((it,i) => {
      const prod = productos.find(p=>p.id===it.productoId)
      return `<div style="display:flex;align-items:center;gap:8px;background:#1e293b;border-radius:12px;padding:8px 12px;margin-bottom:6px;">
        <span style="flex:1;font-size:13px;color:#fff;">${prod?.nombre||'?'}</span>
        <input type="number" min="1" value="${it.cantidad}" style="width:64px;background:#0f172a;border:1px solid #334155;color:#fff;border-radius:8px;padding:4px 8px;font-size:13px;text-align:center;" onchange="updateItemNP(${i},this.value)">
        <span style="color:#34d399;font-size:13px;font-weight:700;min-width:70px;text-align:right;">${fmtCOP((prod?.precio||0)*it.cantidad)}</span>
        <button onclick="removeItemNP(${i})" style="background:none;border:none;color:#f87171;cursor:pointer;padding:2px;"><i class="fas fa-times"></i></button>
      </div>`
    }).join('')
  }

  window.updateItemNP = (i,v) => { itemsForm[i].cantidad=Math.max(1,parseInt(v)||1); refreshNPForm() }
  window.removeItemNP = (i) => { itemsForm.splice(i,1); refreshNPForm() }
  window.addItemNP = () => {
    const sel = document.getElementById('npProdSel')
    const id = sel.value; if(!id) return
    if(itemsForm.find(x=>x.productoId===id)) { showToast('Producto ya agregado','#f59e0b'); return }
    itemsForm.push({productoId:id,cantidad:1})
    sel.value=''
    refreshNPForm()
  }
  window.refreshNPForm = () => {
    const total = itemsForm.reduce((s,it)=>{ const p=productos.find(pr=>pr.id===it.productoId); return s+(p?p.precio*it.cantidad:0) },0)
    document.getElementById('npItems').innerHTML = renderItems()
    document.getElementById('npTotal').textContent = fmtCOP(total)
  }
  window.guardarNuevoPedido = () => {
    const clienteId = document.getElementById('npCliente').value
    const metodoPago = document.getElementById('npMetodo').value
    const notas = document.getElementById('npNotas').value
    if(!clienteId) { showToast('⚠️ Selecciona un cliente','#f59e0b'); return }
    if(!itemsForm.length) { showToast('⚠️ Agrega al menos un producto','#f59e0b'); return }
    const total = itemsForm.reduce((s,it)=>{ const p=productos.find(pr=>pr.id===it.productoId); return s+(p?p.precio*it.cantidad:0) },0)
    const nro = String(DB.get('pedidos').length+1).padStart(3,'0')
    const pedido = {
      id:uid(), codigo:`PED-${nro}`, clienteId, metodoPago, canal:'manual', notas, total,
      pagoConfirmado:false, estado:'pendiente', creado:new Date().toISOString(),
      items: itemsForm.map(it=>{ const p=productos.find(pr=>pr.id===it.productoId); return {productoId:it.productoId,cantidad:it.cantidad,precio:p?.precio||0,subtotal:(p?.precio||0)*it.cantidad} })
    }
    const pedidos = DB.get('pedidos'); pedidos.push(pedido); DB.set('pedidos',pedidos)
    closeModal(); renderPedidos(); showToast('✅ Pedido creado: '+pedido.codigo)
  }

  openModal('Nuevo pedido', `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;">
      <div>
        <div class="label">Cliente</div>
        <select class="input" id="npCliente">
          <option value="">Seleccionar...</option>
          ${clientes.map(c=>`<option value="${c.id}">${c.nombre}</option>`).join('')}
        </select>
      </div>
      <div>
        <div class="label">Método de pago</div>
        <select class="input" id="npMetodo">
          <option value="efectivo">Efectivo</option>
          <option value="nequi">Nequi</option>
          <option value="transferencia">Transferencia</option>
        </select>
      </div>
    </div>
    <div style="margin-bottom:12px;">
      <div class="label">Agregar producto</div>
      <div style="display:flex;gap:8px;">
        <select class="input" id="npProdSel" style="flex:1;">
          <option value="">Seleccionar producto...</option>
          ${productos.map(p=>`<option value="${p.id}">${p.nombre} — ${fmtCOP(p.precio)}</option>`).join('')}
        </select>
        <button class="btn-secondary" onclick="addItemNP()"><i class="fas fa-plus"></i></button>
      </div>
    </div>
    <div id="npItems" style="margin-bottom:12px;"></div>
    <div style="display:flex;justify-content:space-between;padding:8px 12px;background:#1e293b;border-radius:12px;margin-bottom:16px;font-size:14px;font-weight:700;">
      <span style="color:#94a3b8;">Total</span><span style="color:#fff;" id="npTotal">${fmtCOP(0)}</span>
    </div>
    <div style="margin-bottom:16px;">
      <div class="label">Notas (opcional)</div>
      <textarea class="input" id="npNotas" rows="2" placeholder="Instrucciones de entrega..." style="resize:none;"></textarea>
    </div>
    <button class="btn-primary" style="width:100%;justify-content:center;" onclick="guardarNuevoPedido()"><i class="fas fa-check"></i> Crear pedido</button>
  `, true)
}

function renderProductos() {
  const filtro = (document.getElementById('filtroProductos')?.value||'').toLowerCase()
  let prods = DB.get('productos')
  if(filtro) prods = prods.filter(p=>p.nombre.toLowerCase().includes(filtro)||p.sku?.toLowerCase().includes(filtro))
  const grid = document.getElementById('productosGrid')
  if(!prods.length) { grid.innerHTML = emptyState('fa-cube','Sin productos','Crea el catálogo'); return }
  grid.innerHTML = prods.map(p=>{
    const costo = calcularCosto(p)
    const m = calcularMargen(p)
    const mc = m<=0?'#ef4444':m<20?'#f59e0b':'#10b981'
    const barBg = m<=0?'#ef4444':m<20?'#f59e0b':'linear-gradient(90deg,#6366f1,#10b981)'
    return `<div class="card" style="padding:18px;cursor:pointer;transition:all .2s;" onclick="abrirModalProducto('${p.id}')"
      onmouseover="this.style.borderColor='rgba(99,102,241,.3)'" onmouseout="this.style.borderColor='rgba(99,102,241,.12)'">
      <div style="display:flex;align-items:start;justify-content:space-between;margin-bottom:10px;">
        <div>
          <div style="font-weight:600;color:#fff;font-size:14px;">${p.nombre}</div>
          ${p.sku?`<div style="font-size:11px;color:#475569;font-family:monospace;margin-top:2px;">${p.sku}</div>`:''}
        </div>
        <span class="badge" style="${p.activo?'background:rgba(16,185,129,.15);color:#34d399;':'background:#1e293b;color:#475569;'}">${p.activo?'Activo':'Inactivo'}</span>
      </div>
      ${p.categoria?`<div style="font-size:11px;color:#818cf8;margin-bottom:10px;">${p.categoria}</div>`:''}
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:12px;text-align:center;">
        ${[['Precio',fmtCOP(p.precio),'#fff'],['Costo',fmtCOP(costo),'#94a3b8'],['Margen',m.toFixed(1)+'%',mc]].map(([l,v,c])=>`
          <div style="background:#1e293b;border-radius:10px;padding:8px 4px;">
            <div style="font-size:10px;color:#475569;margin-bottom:2px;">${l}</div>
            <div style="font-size:13px;font-weight:700;color:${c};">${v}</div>
          </div>`).join('')}
      </div>
      <div class="progress-bar" style="margin-bottom:10px;"><div class="progress-fill" style="width:${Math.max(0,Math.min(100,m))}%;background:${barBg};"></div></div>
      <div style="display:flex;justify-content:space-between;font-size:11px;color:#475569;">
        <span>Stock: <strong style="color:${p.stock<=p.stockMin?'#ef4444':'#94a3b8'}">${p.stock} ${p.unidad}</strong></span>
        ${p.receta?.length?`<span><i class="fas fa-flask" style="margin-right:3px;"></i>${p.receta.length} insumo${p.receta.length>1?'s':''}</span>`:''}
      </div>
    </div>`
  }).join('')
}

function abrirModalProducto(id) {
  const insumos = DB.get('insumos')
  const productos = DB.get('productos')
  const p = id ? productos.find(x=>x.id===id) : null

  let recetaForm = p ? [...(p.receta||[]).map(r=>({...r}))] : []

  const renderRecetaForm = () => recetaForm.map((r,i)=>{
    const ins = insumos.find(x=>x.id===r.insumoId)
    return `<div style="display:flex;align-items:center;gap:8px;background:#1e293b;border-radius:12px;padding:8px 12px;margin-bottom:6px;">
      <span style="flex:1;font-size:13px;color:#fff;">${ins?.nombre||'?'}</span>
      <input type="number" min="0.001" step="0.001" value="${r.cant}" style="width:70px;background:#0f172a;border:1px solid #334155;color:#fff;border-radius:8px;padding:4px 8px;font-size:13px;text-align:center;" onchange="updateRecetaItem(${i},this.value)">
      <span style="font-size:11px;color:#475569;min-width:24px;">${ins?.unidad||''}</span>
      <button onclick="removeRecetaItem(${i})" style="background:none;border:none;color:#f87171;cursor:pointer;padding:2px;"><i class="fas fa-times"></i></button>
    </div>`
  }).join('')

  const calcLive = () => {
    const precio = parseFloat(document.getElementById('fpPrecio')?.value||0)
    const costo = recetaForm.reduce((s,r)=>{ const ins=insumos.find(i=>i.id===r.insumoId); return s+(ins?ins.costo*r.cant:0) },0)
    const m = precio>0?((precio-costo)/precio*100):0
    const el = document.getElementById('fpMargenLive')
    if(el) { el.textContent=m.toFixed(1)+'%'; el.style.color=m<=0?'#ef4444':m<20?'#f59e0b':'#10b981' }
    const ce = document.getElementById('fpCostoLive')
    if(ce) ce.textContent = fmtCOP(costo)
  }

  window.updateRecetaItem = (i,v) => { recetaForm[i].cant=parseFloat(v)||0; document.getElementById('recetaFormContainer').innerHTML=renderRecetaForm(); calcLive() }
  window.removeRecetaItem = (i) => { recetaForm.splice(i,1); document.getElementById('recetaFormContainer').innerHTML=renderRecetaForm(); calcLive() }
  window.addRecetaItem = () => {
    const sel = document.getElementById('fpInsSel')
    const id = sel.value; if(!id) return
    if(recetaForm.find(r=>r.insumoId===id)) { showToast('Insumo ya en la receta','#f59e0b'); return }
    recetaForm.push({insumoId:id,cant:1}); sel.value=''
    document.getElementById('recetaFormContainer').innerHTML=renderRecetaForm(); calcLive()
  }
  window.guardarProducto = () => {
    const nombre = document.getElementById('fpNombre').value.trim()
    const sku = document.getElementById('fpSku').value.trim()
    const precio = parseFloat(document.getElementById('fpPrecio').value)||0
    const stock = parseInt(document.getElementById('fpStock').value)||0
    const stockMin = parseInt(document.getElementById('fpStockMin').value)||0
    const unidad = document.getElementById('fpUnidad').value
    const categoria = document.getElementById('fpCategoria').value
    const activo = document.getElementById('fpActivo').checked
    if(!nombre || !precio) { showToast('⚠️ Nombre y precio son requeridos','#f59e0b'); return }
    const payload = {id:id||uid(),nombre,sku,precio,stock,stockMin,unidad,categoria,activo,receta:recetaForm}
    const prods = DB.get('productos')
    const idx = prods.findIndex(x=>x.id===payload.id)
    if(idx>=0) prods[idx]=payload; else prods.push(payload)
    DB.set('productos',prods)
    closeModal(); renderProductos(); showToast(id?'✅ Producto actualizado':'✅ Producto creado')
  }
  window.eliminarProducto = () => {
    if(!confirm('¿Eliminar este producto?')) return
    const prods = DB.get('productos').filter(x=>x.id!==id)
    DB.set('productos',prods); closeModal(); renderProductos(); showToast('🗑️ Producto eliminado')
  }

  openModal((id?'Editar':'Nuevo')+' producto', `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;">
      <div style="grid-column:1/-1;"><div class="label">Nombre *</div><input class="input" id="fpNombre" value="${p?.nombre||''}" placeholder="ej: Jabón de glicerina 100g"></div>
      <div><div class="label">SKU</div><input class="input" id="fpSku" value="${p?.sku||''}" placeholder="JAB-100G"></div>
      <div><div class="label">Categoría</div>
        <select class="input" id="fpCategoria">
          ${['Jabones','Velas','Baño','Cursos','Otros'].map(c=>`<option ${p?.categoria===c?'selected':''}>${c}</option>`).join('')}
        </select>
      </div>
      <div><div class="label">Precio de venta (COP) *</div><input class="input" type="number" id="fpPrecio" value="${p?.precio||''}" oninput="calcLive()" placeholder="15000"></div>
      <div><div class="label">Unidad</div>
        <select class="input" id="fpUnidad">
          ${['unidad','cupo','g','kg','ml','l'].map(u=>`<option ${p?.unidad===u?'selected':''}>${u}</option>`).join('')}
        </select>
      </div>
      <div><div class="label">Stock actual</div><input class="input" type="number" id="fpStock" value="${p?.stock??0}"></div>
      <div><div class="label">Stock mínimo</div><input class="input" type="number" id="fpStockMin" value="${p?.stockMin??0}"></div>
      <div style="grid-column:1/-1;display:flex;align-items:center;gap:8px;">
        <input type="checkbox" id="fpActivo" ${p?.activo!==false?'checked':''} style="width:16px;height:16px;accent-color:#6366f1;">
        <label for="fpActivo" style="font-size:13px;color:#94a3b8;cursor:pointer;">Producto activo (visible en catálogo)</label>
      </div>
    </div>
    <div style="margin-bottom:14px;">
      <div class="label" style="margin-bottom:8px;">Receta de producción</div>
      <div style="display:flex;gap:8px;margin-bottom:8px;">
        <select class="input" id="fpInsSel" style="flex:1;">
          <option value="">Agregar insumo...</option>
          ${insumos.map(i=>`<option value="${i.id}">${i.nombre} (${i.unidad}) — ${fmtCOP(i.costo)}/${i.unidad}</option>`).join('')}
        </select>
        <button class="btn-secondary" onclick="addRecetaItem()"><i class="fas fa-plus"></i></button>
      </div>
      <div id="recetaFormContainer">${renderRecetaForm()}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:8px;text-align:center;">
        <div style="background:#1e293b;border-radius:10px;padding:8px;"><div style="font-size:10px;color:#475569;">Costo producción</div><div style="font-size:13px;font-weight:700;color:#94a3b8;" id="fpCostoLive">${fmtCOP(calcularCosto(p||{}))}</div></div>
        <div style="background:#1e293b;border-radius:10px;padding:8px;"><div style="font-size:10px;color:#475569;">Precio venta</div><div style="font-size:13px;font-weight:700;color:#fff;">${fmtCOP(p?.precio||0)}</div></div>
        <div style="background:#1e293b;border-radius:10px;padding:8px;"><div style="font-size:10px;color:#475569;">Margen</div><div style="font-size:13px;font-weight:700;" id="fpMargenLive">—</div></div>
      </div>
    </div>
    <div style="display:flex;gap:8px;">
      <button class="btn-primary" style="flex:1;justify-content:center;" onclick="guardarProducto()"><i class="fas fa-check"></i> ${p?'Guardar cambios':'Crear producto'}</button>
      ${p?`<button class="btn-danger" onclick="eliminarProducto()"><i class="fas fa-trash"></i></button>`:''}
    </div>
  `, true)
  setTimeout(calcLive, 50)
}

function renderInventario() {
  const insumos = DB.get('insumos')
  const alertas = insumos.filter(i=>i.stock<=i.stockMin)

  const banner = document.getElementById('alertasBanner')
  banner.innerHTML = alertas.length
    ? `<span class="badge" style="background:rgba(239,68,68,.15);color:#f87171;font-size:12px;padding:6px 14px;"><i class="fas fa-exclamation-triangle" style="margin-right:6px;"></i>${alertas.length} alertas de stock bajo</span>`
    : `<span class="badge" style="background:rgba(16,185,129,.15);color:#34d399;font-size:12px;padding:6px 14px;"><i class="fas fa-check-circle" style="margin-right:6px;"></i>Todo el stock está bien</span>`

  const tabla = document.getElementById('tablaInsumos')
  tabla.innerHTML = `<thead><tr style="border-bottom:1px solid #1e293b;">
    ${['Insumo','Stock actual','Stock mín.','Costo unit.','Proveedor','Estado',''].map(h=>`<th style="text-align:left;font-size:11px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.06em;padding:12px 16px;">${h}</th>`).join('')}
  </tr></thead><tbody>
  ${insumos.map(i=>{
    const alerta = i.stock <= i.stockMin
    return `<tr class="table-row">
      <td style="padding:12px 16px;font-weight:500;color:#fff;">${i.nombre}</td>
      <td style="padding:12px 16px;font-weight:${alerta?'700':'400'};color:${alerta?'#f87171':'#e2e8f0'};">${i.stock} ${i.unidad}</td>
      <td style="padding:12px 16px;color:#64748b;">${i.stockMin} ${i.unidad}</td>
      <td style="padding:12px 16px;color:#34d399;">${fmtCOP(i.costo)}/${i.unidad}</td>
      <td style="padding:12px 16px;color:#64748b;font-size:12px;">${i.proveedor||'—'}</td>
      <td style="padding:12px 16px;">
        ${alerta
          ? `<span class="badge" style="background:rgba(239,68,68,.15);color:#f87171;"><i class="fas fa-exclamation-triangle"></i> Bajo</span>`
          : `<span class="badge" style="background:rgba(16,185,129,.15);color:#34d399;"><i class="fas fa-check"></i> OK</span>`}
      </td>
      <td style="padding:12px 16px;">
        <button class="btn-ghost" onclick="abrirEntrada('${i.id}')"><i class="fas fa-plus-circle"></i> Entrada</button>
        <button class="btn-ghost" onclick="editarInsumo('${i.id}')"><i class="fas fa-pen"></i></button>
      </td>
    </tr>`
  }).join('')}
  </tbody>`
}

function abrirEntrada(insumoId) {
  const ins = DB.get('insumos').find(i=>i.id===insumoId)
  if(!ins) return
  window.guardarEntrada = () => {
    const cantidad = parseFloat(document.getElementById('entCant').value)||0
    const costoTotal = parseFloat(document.getElementById('entCosto').value)||0
    if(!cantidad||!costoTotal) { showToast('⚠️ Completa los campos','#f59e0b'); return }
    const insumos = DB.get('insumos')
    const idx = insumos.findIndex(i=>i.id===insumoId)
    if(idx<0) return
    insumos[idx].stock = insumos[idx].stock + cantidad
    insumos[idx].costo = costoTotal / cantidad
    DB.set('insumos',insumos)
    // Registrar egreso
    const movs = DB.get('movimientos')
    movs.push({id:uid(),tipo:'egreso',categoria:'compra_insumo',monto:costoTotal,descripcion:`Compra: ${ins.nombre}`,canal:'efectivo',fecha:hoy()})
    DB.set('movimientos',movs)
    closeModal(); renderInventario(); showToast('✅ Entrada registrada. Costos actualizados.')
  }
  openModal('Entrada: '+ins.nombre, `
    <div style="margin-bottom:12px;background:rgba(99,102,241,.08);border-radius:12px;padding:12px;font-size:12px;">
      <span style="color:#94a3b8;">Stock actual: </span><strong style="color:#fff;">${ins.stock} ${ins.unidad}</strong>
      <span style="color:#94a3b8;margin-left:12px;">Costo unitario: </span><strong style="color:#34d399;">${fmtCOP(ins.costo)}/${ins.unidad}</strong>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;">
      <div><div class="label">Cantidad (${ins.unidad})</div><input class="input" type="number" min="0.01" step="0.01" id="entCant" placeholder="ej: 500" oninput="
        const c=parseFloat(this.value)||0, ct=parseFloat(document.getElementById('entCosto').value)||0;
        document.getElementById('entNuevoCosto').textContent=c&&ct?'Nuevo costo unitario: '+new Intl.NumberFormat('es-CO',{style:'currency',currency:'COP',maximumFractionDigits:0}).format(ct/c)+'/'+('${ins.unidad}'):'';
      "></div>
      <div><div class="label">Costo total (COP)</div><input class="input" type="number" min="0" id="entCosto" placeholder="ej: 25000" oninput="
        const c=parseFloat(document.getElementById('entCant').value)||0, ct=parseFloat(this.value)||0;
        document.getElementById('entNuevoCosto').textContent=c&&ct?'Nuevo costo unitario: '+new Intl.NumberFormat('es-CO',{style:'currency',currency:'COP',maximumFractionDigits:0}).format(ct/c)+'/'+('${ins.unidad}'):'';
      "></div>
    </div>
    <div id="entNuevoCosto" style="font-size:12px;color:#34d399;margin-bottom:16px;min-height:18px;"></div>
    <button class="btn-primary" style="width:100%;justify-content:center;" onclick="guardarEntrada()"><i class="fas fa-check"></i> Registrar entrada</button>
  `)
}

function editarInsumo(id) {
  const ins = DB.get('insumos').find(i=>i.id===id)
  if(!ins) return
  window.guardarInsumo = () => {
    const insumos = DB.get('insumos')
    const idx = insumos.findIndex(i=>i.id===id)
    insumos[idx] = {
      ...insumos[idx],
      nombre: document.getElementById('inNombre').value,
      unidad: document.getElementById('inUnidad').value,
      stock: parseFloat(document.getElementById('inStock').value)||0,
      stockMin: parseFloat(document.getElementById('inStockMin').value)||0,
      costo: parseFloat(document.getElementById('inCosto').value)||0,
      proveedor: document.getElementById('inProveedor').value,
    }
    DB.set('insumos',insumos); closeModal(); renderInventario(); showToast('✅ Insumo actualizado')
  }
  openModal('Editar insumo', `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;">
      <div style="grid-column:1/-1;"><div class="label">Nombre</div><input class="input" id="inNombre" value="${ins.nombre}"></div>

// ════════════════════════════════════════════════
let tabFinanciero = 'resumen'
let chartFinInstance = null

function setTabFin(tab) {
  tabFinanciero = tab
  document.querySelectorAll('.tab-fin').forEach(b => {
    const isActive = b.id === 'tabFin-'+tab
    b.style.background = isActive ? '#6366f1' : 'transparent'
    b.style.color = isActive ? '#fff' : '#94a3b8'
    b.style.fontWeight = isActive ? '600' : '500'
  })
  renderFinanciero()
}

function renderFinanciero() {
  const movs = DB.get('movimientos')
  const mes = hoy().slice(0,7)
  const movMes = movs.filter(m=>m.fecha&&m.fecha.startsWith(mes))
  const ingresos = movMes.filter(m=>m.tipo==='ingreso')
  const egresos = movMes.filter(m=>m.tipo==='egreso')
  const totalIngresos = ingresos.reduce((s,m)=>s+m.monto,0)
  const totalEgresos = egresos.reduce((s,m)=>s+m.monto,0)
  const utilidad = totalIngresos - totalEgresos

  const cont = document.getElementById('finContent')

  if(tabFinanciero==='resumen') {
    const egresosCat = egresos.reduce((acc,m)=>{acc[m.categoria]=(acc[m.categoria]||0)+m.monto;return acc},{})
    const ingresosCan = ingresos.reduce((acc,m)=>{acc[m.canal]=(acc[m.canal]||0)+m.monto;return acc},{})
    cont.innerHTML = `
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px;">
        ${[
          ['fa-arrow-up','linear-gradient(135deg,#10b981,#0d9488)','Ingresos',fmtCOP(totalIngresos)],
          ['fa-arrow-down','linear-gradient(135deg,#ef4444,#f97316)','Egresos',fmtCOP(totalEgresos)],
          ['fa-coins',utilidad>=0?'linear-gradient(135deg,#6366f1,#a855f7)':'linear-gradient(135deg,#ef4444,#ec4899)','Utilidad neta',fmtCOP(utilidad)],
          ['fa-exchange-alt','linear-gradient(135deg,#64748b,#475569)','Movimientos',movMes.length],
        ].map(([ic,bg,lb,v])=>`<div class="card stat-card" style="padding:16px;">
          <div style="width:36px;height:36px;background:${bg};border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:10px;">
            <i class="fas ${ic}" style="color:#fff;font-size:14px;"></i>
          </div>
          <div style="font-size:11px;color:#64748b;margin-bottom:3px;">${lb}</div>
          <div style="font-size:18px;font-weight:700;color:#fff;">${v}</div>
        </div>`).join('')}
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
        <div class="card" style="padding:20px;">
          <div style="font-weight:600;color:#fff;margin-bottom:14px;">Egresos por categoría</div>
          ${Object.keys(egresosCat).length===0
            ? `<div style="text-align:center;padding:20px;color:#475569;font-size:12px;">Sin egresos este mes</div>`
            : Object.entries(egresosCat).map(([cat,monto],i)=>`
              <div style="margin-bottom:12px;">
                <div style="display:flex;justify-content:space-between;margin-bottom:4px;font-size:13px;">
                  <span style="color:#e2e8f0;text-transform:capitalize;">${cat.replace(/_/g,' ')}</span>
                  <span style="color:#fff;font-weight:600;">${fmtCOP(monto)}</span>
                </div>
                <div class="progress-bar"><div class="progress-fill" style="width:${totalEgresos?(monto/totalEgresos*100):0}%;background:${['#6366f1','#a855f7','#ec4899','#f59e0b'][i%4]};"></div></div>
              </div>`).join('')}
        </div>
        <div class="card" style="padding:20px;">
          <div style="font-weight:600;color:#fff;margin-bottom:14px;">Ingresos por canal de pago</div>
          ${Object.keys(ingresosCan).length===0
            ? `<div style="text-align:center;padding:20px;color:#475569;font-size:12px;">Sin ingresos este mes</div>`
            : Object.entries(ingresosCan).map(([canal,monto])=>`
              <div style="display:flex;justify-content:space-between;align-items:center;background:#1e293b;border-radius:12px;padding:12px 14px;margin-bottom:8px;">
                <span style="font-size:13px;color:#fff;text-transform:capitalize;">${canal.replace('_',' ')}</span>
                <span style="font-size:14px;font-weight:700;color:#34d399;">${fmtCOP(monto)}</span>
              </div>`).join('')}
        </div>
      </div>`
  }

  if(tabFinanciero==='movimientos') {
    cont.innerHTML = `
      <div style="display:flex;justify-content:flex-end;margin-bottom:12px;">
        <button class="btn-primary" onclick="abrirModalEgreso()"><i class="fas fa-minus-circle"></i> Registrar egreso</button>
      </div>
      <div class="card" style="overflow:hidden;">
        ${movMes.length===0
          ? emptyState('fa-list-alt','Sin movimientos este mes')
          : `<table style="width:100%;border-collapse:collapse;font-size:13px;">
              <thead><tr style="border-bottom:1px solid #1e293b;">
                ${['Fecha','Tipo','Categoría','Descripción','Canal','Monto'].map(h=>`<th style="text-align:left;font-size:11px;font-weight:600;color:#64748b;text-transform:uppercase;padding:12px 16px;">${h}</th>`).join('')}
              </tr></thead><tbody>
              ${[...movMes].reverse().map(m=>`<tr class="table-row">
                <td style="padding:11px 16px;color:#64748b;font-size:12px;">${fmtFecha(m.fecha)}</td>
                <td style="padding:11px 16px;">
                  <span class="badge" style="background:${m.tipo==='ingreso'?'rgba(16,185,129,.15)':'rgba(239,68,68,.15)'};color:${m.tipo==='ingreso'?'#34d399':'#f87171'};">
                    <i class="fas fa-arrow-${m.tipo==='ingreso'?'up':'down'}" style="font-size:9px;"></i> ${m.tipo}
                  </span>
                </td>
                <td style="padding:11px 16px;color:#94a3b8;font-size:12px;text-transform:capitalize;">${(m.categoria||'').replace(/_/g,' ')}</td>
                <td style="padding:11px 16px;color:#e2e8f0;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${m.descripcion||'—'}</td>
                <td style="padding:11px 16px;color:#64748b;font-size:12px;text-transform:capitalize;">${(m.canal||'').replace('_',' ')}</td>
                <td style="padding:11px 16px;font-weight:700;color:${m.tipo==='ingreso'?'#34d399':'#f87171'};">${m.tipo==='ingreso'?'+':'-'}${fmtCOP(m.monto)}</td>
              </tr>`).join('')}
              </tbody></table>`}
      </div>`
  }

  if(tabFinanciero==='rentabilidad') {
    const productos = DB.get('productos').filter(p=>p.activo)
    const conMargen = productos.map(p=>({...p,costo:calcularCosto(p),margen:calcularMargen(p)})).sort((a,b)=>a.margen-b.margen)
    const conAlerta = conMargen.filter(p=>p.margen<=0)
    cont.innerHTML = `
      ${conAlerta.length?`<div style="background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:14px;padding:12px 16px;margin-bottom:16px;font-size:13px;color:#fca5a5;display:flex;gap:10px;align-items:center;">
        <i class="fas fa-exclamation-triangle" style="color:#ef4444;"></i>
        <strong>${conAlerta.length} producto(s)</strong> se están vendiendo sin margen o a pérdida.
      </div>`:''}
      <div class="card" style="overflow:hidden;">
        <table style="width:100%;border-collapse:collapse;font-size:13px;">
          <thead><tr style="border-bottom:1px solid #1e293b;">
            ${['Producto','Precio venta','Costo prod.','Ganancia $','Margen %'].map(h=>`<th style="text-align:left;font-size:11px;font-weight:600;color:#64748b;text-transform:uppercase;padding:12px 16px;">${h}</th>`).join('')}
          </tr></thead><tbody>
          ${conMargen.map(p=>`<tr class="table-row">
            <td style="padding:12px 16px;font-weight:500;color:#fff;">${p.nombre}</td>
            <td style="padding:12px 16px;color:#e2e8f0;">${fmtCOP(p.precio)}</td>
            <td style="padding:12px 16px;color:#94a3b8;">${fmtCOP(p.costo)}</td>
            <td style="padding:12px 16px;font-weight:600;color:#34d399;">${fmtCOP(p.precio-p.costo)}</td>
            <td style="padding:12px 16px;">
              <span class="badge" style="background:${p.margen<=0?'rgba(239,68,68,.15)':'rgba(16,185,129,.15)'};color:${p.margen<=0?'#f87171':'#34d399'};">
                ${p.margen.toFixed(1)}%${p.margen<=0?' ⚠️':''}
              </span>
            </td>
          </tr>`).join('')}
          </tbody>
        </table>
      </div>`
  }
}

function abrirModalEgreso() {
  window.guardarEgreso = () => {
    const monto = parseFloat(document.getElementById('egMonto').value)||0
    if(!monto) { showToast('⚠️ El monto es requerido','#f59e0b'); return }
    const movs = DB.get('movimientos')
    movs.push({id:uid(),tipo:'egreso',categoria:document.getElementById('egCat').value,monto,descripcion:document.getElementById('egDesc').value,canal:document.getElementById('egCanal').value,fecha:document.getElementById('egFecha').value||hoy()})
    DB.set('movimientos',movs); closeModal(); renderFinanciero(); showToast('✅ Egreso registrado')
  }
  openModal('Registrar egreso', `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;">
      <div><div class="label">Categoría</div>
        <select class="input" id="egCat">
          <option value="gasto_operativo">Gasto operativo</option>
          <option value="compra_insumo">Compra insumo</option>
          <option value="otro">Otro</option>
        </select>
      </div>
      <div><div class="label">Monto (COP)</div><input class="input" type="number" id="egMonto" placeholder="ej: 50000"></div>
      <div style="grid-column:1/-1;"><div class="label">Descripción</div><input class="input" id="egDesc" placeholder="ej: Gas para producción"></div>
      <div><div class="label">Canal</div>
        <select class="input" id="egCanal">
          <option value="efectivo">Efectivo</option>
          <option value="transferencia">Transferencia</option>
          <option value="nequi">Nequi</option>
        </select>
      </div>
      <div><div class="label">Fecha</div><input class="input" type="date" id="egFecha" value="${hoy()}"></div>
    </div>
    <button class="btn-primary" style="width:100%;justify-content:center;" onclick="guardarEgreso()"><i class="fas fa-save"></i> Guardar egreso</button>
  `)
}

//  CLIENTES
// ════════════════════════════════════════════════
function renderClientes() {
  const filtro = (document.getElementById('filtroClientes')?.value||'').toLowerCase()
  let clientes = DB.get('clientes')
  if(filtro) clientes = clientes.filter(c=>c.nombre.toLowerCase().includes(filtro)||c.telefono?.includes(filtro))
  const tabla = document.getElementById('tablaClientes')
  if(!clientes.length) { tabla.innerHTML=`<tr><td colspan="6">${emptyState('fa-users','Sin clientes','Agrega el primer cliente')}</td></tr>`; return }
  tabla.innerHTML = `<thead><tr style="border-bottom:1px solid #1e293b;">
    ${['Cliente','Teléfono','Email','Dirección','Notas',''].map(h=>`<th style="text-align:left;font-size:11px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.06em;padding:12px 16px;">${h}</th>`).join('')}
  </tr></thead><tbody>
  ${clientes.map(c=>`<tr class="table-row">
    <td style="padding:12px 16px;">
      <div style="display:flex;align-items:center;gap:10px;">
        <div style="width:32px;height:32px;background:linear-gradient(135deg,#6366f1,#a855f7);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:700;flex-shrink:0;">${c.nombre.slice(0,2).toUpperCase()}</div>
        <span style="font-weight:500;color:#fff;">${c.nombre}</span>
      </div>
    </td>
    <td style="padding:12px 16px;color:#e2e8f0;">${c.telefono||'—'}</td>
    <td style="padding:12px 16px;color:#94a3b8;font-size:12px;">${c.email||'—'}</td>
    <td style="padding:12px 16px;color:#64748b;font-size:12px;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${c.direccion||'—'}</td>
    <td style="padding:12px 16px;color:#64748b;font-size:12px;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${c.notas||'—'}</td>
    <td style="padding:12px 16px;">
      <button class="btn-ghost" onclick="abrirModalCliente('${c.id}')"><i class="fas fa-pen"></i> Editar</button>
      <button class="btn-ghost" onclick="eliminarCliente('${c.id}')" style="color:#f87171;"><i class="fas fa-trash"></i></button>
    </td>
  </tr>`).join('')}
  </tbody>`
}

function abrirModalCliente(id) {
  const c = id ? DB.get('clientes').find(x=>x.id===id) : null
  window.guardarCliente = () => {
    const nombre = document.getElementById('cliNombre').value.trim()
    if(!nombre) { showToast('⚠️ El nombre es requerido','#f59e0b'); return }
    const payload = { id:id||uid(), nombre, telefono:document.getElementById('cliTel').value, email:document.getElementById('cliEmail').value, direccion:document.getElementById('cliDir').value, notas:document.getElementById('cliNotas').value, creado:c?.creado||hoy() }
    const clientes = DB.get('clientes')
    const idx = clientes.findIndex(x=>x.id===payload.id)
    if(idx>=0) clientes[idx]=payload; else clientes.push(payload)
    DB.set('clientes',clientes); closeModal(); renderClientes(); showToast(id?'✅ Cliente actualizado':'✅ Cliente creado')
  }
  openModal((id?'Editar':'Nuevo')+' cliente', `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;">
      <div style="grid-column:1/-1;"><div class="label">Nombre *</div><input class="input" id="cliNombre" value="${c?.nombre||''}" placeholder="Nombre o razón social"></div>
      <div><div class="label">Teléfono</div><input class="input" id="cliTel" value="${c?.telefono||''}" placeholder="3001234567"></div>
      <div><div class="label">Email</div><input class="input" type="email" id="cliEmail" value="${c?.email||''}" placeholder="correo@ejemplo.com"></div>
      <div style="grid-column:1/-1;"><div class="label">Dirección</div><input class="input" id="cliDir" value="${c?.direccion||''}" placeholder="Calle 45 #12-30, Bogotá"></div>
      <div style="grid-column:1/-1;"><div class="label">Notas</div><textarea class="input" id="cliNotas" rows="2" style="resize:none;" placeholder="ej: Cliente mayorista, paga por transferencia">${c?.notas||''}</textarea></div>
    </div>
    <button class="btn-primary" style="width:100%;justify-content:center;" onclick="guardarCliente()"><i class="fas fa-check"></i> ${c?'Actualizar':'Crear cliente'}</button>
  `)
}

function eliminarCliente(id) {
  if(!confirm('¿Eliminar este cliente? Los pedidos asociados permanecerán.')) return
  DB.set('clientes', DB.get('clientes').filter(c=>c.id!==id))
  renderClientes(); showToast('🗑️ Cliente eliminado')
}

// ════════════════════════════════════════════════
//  HELPERS: MODAL, TOAST, EMPTY
// ════════════════════════════════════════════════
function openModal(titulo, html, wide=false) {
  document.getElementById('modalTitle').textContent = titulo
  document.getElementById('modalBody').innerHTML = html
  document.getElementById('modalBox').className = 'modal-box' + (wide?' wide':'')
  document.getElementById('modalOverlay').style.display = 'flex'
}
function closeModal() {
  document.getElementById('modalOverlay').style.display = 'none'
  document.getElementById('modalBody').innerHTML = ''
}

let toastTimer
function showToast(msg, color='#34d399') {
  const t = document.getElementById('toast')
  t.innerHTML = `<i class="fas fa-check-circle" style="color:${color};font-size:16px;"></i> ${msg}`
  t.style.display = 'flex'
  clearTimeout(toastTimer)
  toastTimer = setTimeout(()=>{ t.style.display='none' }, 3000)
}

function emptyState(icon, titulo, sub='') {
  return `<div style="text-align:center;padding:48px 24px;">
    <div style="width:56px;height:56px;background:#1e293b;border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;">
      <i class="fas ${icon}" style="color:#334155;font-size:22px;"></i>
    </div>
    <div style="font-weight:600;color:#94a3b8;margin-bottom:4px;">${titulo}</div>
    ${sub?`<div style="font-size:12px;color:#475569;">${sub}</div>`:''}
  </div>`
}

// ════════════════════════════════════════════════
//  RESPONSIVE
// ════════════════════════════════════════════════
function checkResponsive() {
  const btn = document.getElementById('menuBtn')
  if(window.innerWidth < 768) {
    btn.style.display = 'block'
    document.getElementById('mainContent').style.marginLeft = '0'
  } else {
    btn.style.display = 'none'
    document.getElementById('mainContent').style.marginLeft = '256px'
    closeSidebar()
  }
}
window.addEventListener('resize', checkResponsive)

// ════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════
initData()
checkResponsive()
renderDashboard()
</script>
