version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: finansoap_postgres
    environment:
      POSTGRES_DB: finansoap_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: finansoap_local
    ports:
      - "5432:5432"
    volumes:
      - finansoap_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: finansoap_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  finansoap_pgdata:
